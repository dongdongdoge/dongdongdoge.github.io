{% if page.sidebar %}
  <aside class="sidebar sticky" aria-label="Page resources">
    {% for item in page.sidebar %}
      {% if item.image %}
        <img src="{{ item.image }}" alt="{% if item.image_alt %}{{ item.image_alt }}{% endif %}">
      {% endif %}
      {% if item.title %}<h3>{{ item.title }}</h3>{% endif %}
      {% if item.text %}{{ item.text | markdownify }}{% endif %}
    {% endfor %}
  </aside>
{% endif %}
